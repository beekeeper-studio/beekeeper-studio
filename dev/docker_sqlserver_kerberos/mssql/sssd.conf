# SSSD config joining SQL Server's host to the Samba AD domain. SQL Server on Linux
# delegates Active Directory domain trust and principal-to-login mapping to SSSD; without
# it, integrated logins are rejected as "from an untrusted domain". id_mapping keeps things
# self-contained (no POSIX attributes needed in the directory).
[sssd]
domains = bks.test
config_file_version = 2
services = nss, pam

[domain/bks.test]
ad_domain = bks.test
krb5_realm = BKS.TEST
realmd_tag = manual
cache_credentials = True
id_provider = ad
krb5_store_password_if_offline = True
default_shell = /bin/bash
ldap_id_mapping = True
use_fully_qualified_names = False
fallback_homedir = /home/%u
access_provider = ad
ad_gpo_access_control = permissive
# The container is not domain-time-synced via the usual host tooling; the shared host clock
# keeps skew within Kerberos tolerance.
