# Kerberos client config shared by the MongoDB container and the CI runner.
# The KDC/admin server is the Samba AD DC, reachable as dc.bks.test (a docker network
# alias inside compose).
[libdefaults]
    default_realm = BKS.TEST
    dns_lookup_realm = false
    dns_lookup_kdc = false
    # Keep the SPN exactly as the app passes it (mongodb/mongodb.bks.test). Reverse DNS
    # or canonicalization would rewrite the host and break the SPN match.
    rdns = false
    dns_canonicalize_hostname = false
    forwardable = true
    udp_preference_limit = 1

[realms]
    BKS.TEST = {
        kdc = dc.bks.test
        admin_server = dc.bks.test
        default_domain = bks.test
    }

[domain_realm]
    .bks.test = BKS.TEST
    bks.test = BKS.TEST
