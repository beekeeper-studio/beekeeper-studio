# Stands up a fully self-contained Kerberos environment for the MongoDB GSSAPI auth test --
# no host setup beyond Docker is required:
#   samba    -- Active Directory DC (KDC + LDAP), realm BKS.TEST
#   mongodb  -- MongoDB Enterprise Server, given the mongodb/<host> service keytab
#   tests    -- the Jest client (Kerberos client + mongosh), runs the spec in-network
#
# GSSAPI authentication is a MongoDB Enterprise Server feature -- MongoDB Community does not
# support it -- so the db service uses the enterprise build. Unlike SQL Server, MongoDB does
# NOT need an OS-level domain join (no SSSD/adcli); it only needs the service keytab to
# decrypt inbound tickets and maps the Kerberos principal directly to a $external user.
#
# The `tests` service joins the same network, so dc.bks.test / mongodb.bks.test resolve via
# Docker DNS (no /etc/hosts), reads the repo krb5.conf via KRB5_CONFIG (no /etc edits), does
# kinit against the in-network KDC, and runs the spec. Drive it with run.sh
# (= docker compose run --rm tests). See
# apps/studio/tests/integration/lib/db/clients/mongodb-kerberos.spec.ts for the test.
name: bks-mongodb-kerberos

networks:
  bksnet:
    driver: bridge
    ipam:
      config:
        # Static subnet so the MongoDB container can point DNS at a fixed Samba IP.
        - subnet: 172.29.0.0/24

volumes:
  # Shared channel for the Samba-exported keytab + readiness markers.
  secrets:
  # Container-private node_modules so the bind-mounted source doesn't shadow them and the
  # host's native module ABI never leaks in.
  tests_root_nm:
  tests_studio_nm:
  tests_uikit_nm:

services:
  samba:
    build:
      context: .
      dockerfile: samba/Dockerfile
    hostname: dc.bks.test
    domainname: bks.test
    # Samba AD DC provisioning needs broad privileges; this is a throwaway test container.
    privileged: true
    networks:
      bksnet:
        # Fixed IP so MongoDB can use this DC as its DNS resolver (AD SRV records).
        ipv4_address: 172.29.0.10
        aliases:
          - dc.bks.test
    volumes:
      - secrets:/shared
    healthcheck:
      # Healthy once the keytab has been exported for the MongoDB container.
      test: ["CMD-SHELL", "test -f /shared/keytab.ready"]
      interval: 5s
      timeout: 5s
      retries: 60

  mongodb:
    build:
      context: .
      dockerfile: mongo/Dockerfile
    hostname: mongodb.bks.test
    domainname: bks.test
    depends_on:
      samba:
        condition: service_healthy
    networks:
      bksnet:
        aliases:
          - mongodb.bks.test
    # Resolve the AD domain via the Samba DC's DNS so the FQDN/SPN line up.
    dns:
      - 172.29.0.10
    dns_search:
      - bks.test
    volumes:
      - secrets:/shared
    # Published only for optional manual debugging (e.g. mongosh from the host); the test
    # runner reaches MongoDB over the Docker network and does not need this.
    ports:
      - "27017:27017"
    healthcheck:
      # Healthy once mongod accepts connections AND the $external Kerberos user is created.
      test: ["CMD-SHELL", "test -f /tmp/mongodb.ready"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    # Gated behind a profile so `docker compose up` for the DB stack doesn't start it;
    # run.sh invokes it via `docker compose run`.
    profiles: ["test"]
    depends_on:
      samba:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - bksnet
    working_dir: /app
    environment:
      KRB_REALM: BKS.TEST
      KRB_TEST_USER: testuser
      KRB_TEST_PASS: "Beekeeper*1User"
      MONGODB_KERBEROS_TEST: "1"
      MONGODB_KERBEROS_HOST: mongodb.bks.test
      MONGODB_KERBEROS_PORT: "27017"
      MONGODB_KERBEROS_SERVICE: mongodb
      # Point the Kerberos client at the repo config without touching /etc.
      KRB5_CONFIG: /app/dev/docker_mongodb_kerberos/krb5.conf
      KRB5CCNAME: /tmp/krb5cc
      HUSKY: "0"
    volumes:
      # Repo root is two levels up from this compose file.
      - ../../:/app
      - tests_root_nm:/app/node_modules
      - tests_studio_nm:/app/apps/studio/node_modules
      - tests_uikit_nm:/app/apps/ui-kit/node_modules
