# NOTE: pnpm is pinned to 10.29.2 (packageManager field in package.json).
# pnpm >= 10.29.3 emits deduplicated `pnpm list` output that electron-builder's
# dependency collector mishandles, silently dropping packages (e.g. mongodb,
# ssh2) from the packaged app. See:
#   https://github.com/pnpm/pnpm/issues/10601
# Before bumping pnpm past 10.29.2, build an AppImage and verify the asar
# still contains node_modules/mongodb (at the right version) and
# node_modules/ssh2.

packages:
  - apps/*

# Flat node_modules (pnpm's recommendation for Electron apps): electron-builder
# packing, electron-builder install-app-deps, and the few hardcoded
# ../../node_modules paths all behave as they did under yarn.
nodeLinker: hoisted

overrides:
  # Stub out cpu-features (optional native dep of ssh2); it breaks
  # cross-platform electron builds and ssh2 works fine without it.
  cpu-features: file:./vendor/empty-package
  axios: ^1.15.0

# pnpm blocks dependency build scripts unless allowlisted here.
# electron must stay in this list or its binary download is skipped.
onlyBuiltDependencies:
  - electron
  - esbuild
  - better-sqlite3
  - oracledb
  - libsql
  - ssh2
  - kerberos
  - mongodb-client-encryption
  - os-dns-native
  # vue-demi's postinstall switches its entrypoint to the Vue 2 build
  - vue-demi
  # Git-hosted deps that build at fetch time (prepare/install scripts)
  - '@vue/web-component-wrapper'
  - sqlanywhere

# Fixes electron-builder's pnpm dependency collector under nodeLinker=hoisted:
# `pnpm list --json` reports virtual-store (.pnpm) paths that don't exist on
# disk, which made the collector resolve duplicated packages to the wrong
# version (the app's mongodb@6 was packaged as mongodb@7). The patch ignores
# nonexistent parent paths so lookups fall back to real on-disk resolution.
patchedDependencies:
  app-builder-lib: patches/app-builder-lib.patch
