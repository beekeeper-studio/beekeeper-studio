name: E2E Smoke Test (Cross-Platform)

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - apps/sqltools/**
      - docs/**

jobs:
  e2e-smoke:
    name: E2E Smoke - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v2

      - name: Install Python 3.11 (non-Mac)
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
        if: runner.os != 'macOS'

      - name: Install Python 3.11 (Mac)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.11
          echo "/opt/homebrew/opt/python@3.11/libexec/bin" >> $GITHUB_PATH

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          npm_config_node_gyp: ${{ github.workspace }}${{ runner.os == 'Windows' && '\node_modules\node-gyp\bin\node-gyp.js' || '/node_modules/node-gyp/bin/node-gyp.js' }}

      - name: Install xvfb-maybe
        run: npm install -g xvfb-maybe

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Serve + Run Tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          xvfb-maybe --auto-servernum --server-args="-screen 0 1024x768x24" bash -c '
            yarn run electron:serve > server.log 2>&1 &
            sleep 15
            cat server.log
            yarn workspace beekeeper-studio test:e2e:ci e2e/tests/appLaunch.test.ts
          '
        env:
          ELECTRON_ENABLE_LOGGING: 1
          ELECTRON_DISABLE_SANDBOX: 1
          ELECTRON_EXTRA_LAUNCH_ARGS: "--disable-gpu"

      - name: Serve + Run Tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          yarn run electron:serve > server.log 2>&1 &
          sleep 30
          cat server.log
          yarn workspace beekeeper-studio test:e2e:ci e2e/tests/appLaunch.test.ts
        env:
          ELECTRON_ENABLE_LOGGING: 1

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: apps/studio/test-results
          retention-days: 7
