name: E2E Tests

permissions:
  contents: read
  actions: write

on:
  push:
    branches:
      - master
    paths-ignore:
      - docs/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/studio/node_modules
            apps/ui-kit/node_modules
            apps/sqltools/node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: yarn install --frozen-lockfile --network-timeout 100000
        env:
          HUSKY: "0"
          npm_config_node_gyp: ${{ github.workspace }}/node_modules/node-gyp/bin/node-gyp.js

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: yarn playwright install chromium

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-24.04
    needs: [prep]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/studio/node_modules
            apps/ui-kit/node_modules
            apps/sqltools/node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true

      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true

      - name: Install Playwright system dependencies
        run: yarn playwright install-deps chromium

      - name: Build UI Kit
        run: yarn lib:build

      - name: Build App
        run: yarn workspace beekeeper-studio build

      - name: Start postgres container
        run: docker compose up psql15 -d --wait

      - name: Run Tests
        shell: bash
        run: |
          xvfb-run --auto-servernum --server-args "-screen 0 1600x1000x24" bash -c '
            yarn workspace beekeeper-studio test:e2e:ci
          '
        env:
          ELECTRON_ENABLE_LOGGING: 1
          ELECTRON_DISABLE_SANDBOX: 1
          ELECTRON_EXTRA_LAUNCH_ARGS: "--disable-gpu"

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/studio/test-results
          retention-days: 7
