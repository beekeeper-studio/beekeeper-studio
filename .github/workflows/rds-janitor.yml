name: RDS Janitor

on:
  schedule:
    # Every 2 hours.
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  sweep:
    name: Sweep orphaned RDS instances
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BKS_TEST_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BKS_TEST_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run cleanup
        env:
          MAX_AGE_HOURS: 2
        run: bin/rds/cleanup-orphans.sh
