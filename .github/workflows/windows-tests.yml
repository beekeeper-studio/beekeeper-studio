name: Windows Tests

permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - 'apps/studio/src/vendor/node-ssh-forward/**'
      - 'apps/studio/src/vendor/ssh2/**'
      - 'apps/studio/src/lib/db/tunnel.ts'
      - 'apps/studio/tests/integration/windows/**'
      - 'apps/studio/jest.integration.windows.config.js'
      - '.github/workflows/windows-tests.yml'
  workflow_dispatch:

jobs:
  windows-tests:
    name: Windows integration tests
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/studio/node_modules
            apps/ui-kit/node_modules
            apps/sqltools/node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: yarn install --frozen-lockfile --network-timeout 100000
        env:
          HUSKY: "0"

      - name: Enable OpenSSH Server
        shell: powershell
        run: |
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic

      - name: Generate SSH key and authorize
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ssh" | Out-Null
          ssh-keygen -t rsa -b 2048 -N '""' -f "$env:USERPROFILE\.ssh\pageant_test"
          $pub = Get-Content "$env:USERPROFILE\.ssh\pageant_test.pub"
          # GH runner user is a local admin, so sshd looks at administrators_authorized_keys.
          $adminKeys = "$env:ProgramData\ssh\administrators_authorized_keys"
          Set-Content -Path $adminKeys -Value $pub -Encoding ascii
          # sshd ignores administrators_authorized_keys unless ACLs are strict.
          icacls $adminKeys /inheritance:r
          icacls $adminKeys /grant "Administrators:F" "SYSTEM:F"
          # Grab all key types sshd might present so ssh doesn't warn/add at runtime.
          ssh-keyscan -t rsa,ecdsa,ed25519 -H 127.0.0.1 > "$env:USERPROFILE\.ssh\known_hosts"

      - name: Verify sshd accepts the key (pre-Pageant sanity check)
        # Uses OpenSSH ssh.exe directly with the private key - no Pageant,
        # no ssh2, no jest. If this fails, the problem is sshd / authorized_keys
        # / key generation, not any of the Pageant plumbing.
        shell: powershell
        run: |
          # GH Actions sets $ErrorActionPreference=stop by default, which treats
          # any native-command stderr as a fatal error. Relax it so harmless ssh
          # warnings don't halt the step.
          $ErrorActionPreference = 'Continue'
          $output = & ssh -i "$env:USERPROFILE\.ssh\pageant_test" `
            -o BatchMode=yes `
            -o StrictHostKeyChecking=no `
            -o UserKnownHostsFile="$env:USERPROFILE\.ssh\known_hosts" `
            "$env:USERNAME@127.0.0.1" "echo ssh-ok" 2>&1
          $exit = $LASTEXITCODE
          Write-Host $output
          if ($exit -ne 0) {
            throw "Direct ssh with private key failed (exit $exit) - sshd/authorized_keys setup is broken"
          }

      - name: Install PuTTY (pageant.exe, puttygen.exe)
        run: choco install putty.install -y --no-progress

      - name: Locate PuTTY install
        id: putty
        shell: powershell
        run: |
          $candidates = @(
            "C:\Program Files\PuTTY",
            "C:\Program Files (x86)\PuTTY",
            "C:\ProgramData\chocolatey\lib\putty.install\tools",
            "C:\ProgramData\chocolatey\lib\putty.portable\tools"
          )
          $puttyDir = $candidates | Where-Object { Test-Path "$_\puttygen.exe" } | Select-Object -First 1
          if (-not $puttyDir) {
            $candidates | ForEach-Object { "  $_  exists=$((Test-Path $_))" }
            throw "puttygen.exe not found"
          }
          Write-Host "Using PuTTY from: $puttyDir"
          "putty_dir=$puttyDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Launch Pageant, verify with plink, run test
        # Single step so Pageant, plink, and the jest test all share the same
        # Windows session - WM_COPYDATA (Pageant's IPC) is session-scoped.
        # Pageant >=0.75 loads OpenSSH-format private keys directly, so we can
        # skip puttygen PPK conversion entirely.
        shell: powershell
        env:
          PAGEANT_TEST: "1"
        run: |
          # Relaxed so native-command stderr (warnings from plink, yarn, etc.)
          # doesn't halt the script. We check $LASTEXITCODE explicitly instead.
          $ErrorActionPreference = "Continue"
          $puttyDir = "${{ steps.putty.outputs.putty_dir }}"
          Remove-Item env:SSH_AUTH_SOCK -ErrorAction SilentlyContinue

          Start-Process -FilePath "$puttyDir\pageant.exe" `
            -ArgumentList "$env:USERPROFILE\.ssh\pageant_test"
          Start-Sleep -Seconds 3
          Get-Process pageant

          # Independent sanity check: plink uses Pageant natively. If this
          # succeeds, Pageant has the key loaded and sshd trusts it. If it
          # fails, the problem is the test harness, not our ssh2 integration.
          Write-Host "--- plink sanity check ---"
          $plinkOut = & "$puttyDir\plink.exe" -agent -batch `
            -hostkey "*" `
            "$env:USERNAME@127.0.0.1" "echo plink-ok" 2>&1
          Write-Host $plinkOut
          if ($LASTEXITCODE -ne 0) {
            throw "plink failed (exit $LASTEXITCODE) - Pageant setup is bad, not the ssh2 code"
          }

          Write-Host "--- jest test ---"
          Set-Location apps/studio
          yarn run test:integration:windows --runInBand --ci
          if ($LASTEXITCODE -ne 0) { throw "jest failed with $LASTEXITCODE" }
