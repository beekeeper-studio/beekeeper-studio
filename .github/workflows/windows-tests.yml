name: Windows Tests

permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - 'apps/studio/src/vendor/node-ssh-forward/**'
      - 'apps/studio/src/vendor/ssh2/**'
      - 'apps/studio/src/lib/db/tunnel.ts'
      - 'apps/studio/tests/integration/windows/**'
      - 'apps/studio/tests/resources/ssh/**'
      - 'apps/studio/jest.integration.windows.config.js'
      - '.github/workflows/windows-tests.yml'
  workflow_dispatch:

jobs:
  windows-tests:
    name: Windows integration tests
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/studio/node_modules
            apps/ui-kit/node_modules
            apps/sqltools/node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: yarn install --frozen-lockfile --network-timeout 100000
        env:
          HUSKY: "0"

      - name: Enable OpenSSH Server
        shell: powershell
        run: |
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType Automatic

      - name: Install test keys and authorize
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ssh" | Out-Null
          $fixtures = "$env:GITHUB_WORKSPACE\apps\studio\tests\resources\ssh"
          Copy-Item "$fixtures\pageant_test"     "$env:USERPROFILE\.ssh\pageant_test"
          Copy-Item "$fixtures\pageant_test.pub" "$env:USERPROFILE\.ssh\pageant_test.pub"

          # GH runner user is a local admin, so sshd looks at administrators_authorized_keys.
          $adminKeys = "$env:ProgramData\ssh\administrators_authorized_keys"
          Copy-Item "$fixtures\pageant_test.pub" $adminKeys
          # sshd ignores administrators_authorized_keys unless ACLs are strict.
          icacls $adminKeys /inheritance:r
          icacls $adminKeys /grant "Administrators:F" "SYSTEM:F"

          # Host keys regenerate per runner, so keyscan remains at CI time.
          ssh-keyscan -t rsa,ecdsa,ed25519 -H 127.0.0.1 > "$env:USERPROFILE\.ssh\known_hosts"

      - name: Verify sshd accepts the key (pre-Pageant sanity check)
        # Uses OpenSSH ssh.exe directly with the private key - no Pageant,
        # no ssh2, no jest. If this fails, the problem is sshd / authorized_keys,
        # not any of the Pageant plumbing.
        shell: powershell
        run: |
          # GH Actions sets $ErrorActionPreference=stop by default, which treats
          # any native-command stderr as a fatal error. Relax it so harmless ssh
          # warnings don't halt the step.
          $ErrorActionPreference = 'Continue'
          $output = & ssh -i "$env:USERPROFILE\.ssh\pageant_test" `
            -o BatchMode=yes `
            -o StrictHostKeyChecking=no `
            -o UserKnownHostsFile="$env:USERPROFILE\.ssh\known_hosts" `
            "$env:USERNAME@127.0.0.1" "echo ssh-ok" 2>&1
          $exit = $LASTEXITCODE
          Write-Host $output
          if ($exit -ne 0) {
            throw "Direct ssh with private key failed (exit $exit) - sshd/authorized_keys setup is broken"
          }

      - name: Install PuTTY (for pageant.exe)
        run: choco install putty.install -y --no-progress

      - name: Locate pageant.exe
        id: putty
        shell: powershell
        run: |
          $candidates = @(
            "C:\Program Files\PuTTY",
            "C:\Program Files (x86)\PuTTY",
            "C:\ProgramData\chocolatey\lib\putty.install\tools"
          )
          $puttyDir = $candidates | Where-Object { Test-Path "$_\pageant.exe" } | Select-Object -First 1
          if (-not $puttyDir) {
            Write-Host "=== candidate probe ==="
            foreach ($c in $candidates) {
              Write-Host "  $c exists=$(Test-Path $c) pageant=$(Test-Path "$c\pageant.exe")"
            }
            Write-Host "=== C:\Program Files\PuTTY contents ==="
            if (Test-Path "C:\Program Files\PuTTY") { Get-ChildItem "C:\Program Files\PuTTY" | Format-Table Name,Length }
            Write-Host "=== chocolatey lib ==="
            if (Test-Path "C:\ProgramData\chocolatey\lib\putty.install") {
              Get-ChildItem "C:\ProgramData\chocolatey\lib\putty.install" -Recurse | Format-Table FullName,Length
            }
            throw "pageant.exe not found"
          }
          Write-Host "Using PuTTY from: $puttyDir"
          Write-Host "=== PuTTY directory contents ==="
          Get-ChildItem $puttyDir | Format-Table Name,Length,LastWriteTime
          Write-Host "=== pageant.exe file info ==="
          $pageantExe = "$puttyDir\pageant.exe"
          $item = Get-Item $pageantExe
          Write-Host "  Path:     $($item.FullName)"
          Write-Host "  Size:     $($item.Length) bytes"
          Write-Host "  Modified: $($item.LastWriteTime)"
          Write-Host "  Version:  $($item.VersionInfo.FileVersion)"
          Write-Host "  Product:  $($item.VersionInfo.ProductVersion)"
          Write-Host "  Company:  $($item.VersionInfo.CompanyName)"
          "putty_dir=$puttyDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Launch Pageant, verify readiness, and run Windows integration tests
        # Pageant in recent PuTTY (>=0.75) accepts OpenSSH-format keys on
        # the command line, so we skip PPK conversion.
        #
        # Launch + verify + test MUST live in the same step: GitHub Actions
        # wraps each Windows step's shell in a Job Object with
        # JOB_OBJECT_LIMIT_KILL_ON_JOB_CLOSE, so any pageant launched in a
        # prior step is killed the instant that step's powershell.exe exits.
        shell: powershell
        env:
          PAGEANT_TEST: "1"
        run: |
          $ErrorActionPreference = 'Continue'
          $puttyDir = "${{ steps.putty.outputs.putty_dir }}"
          $pageantExe = "$puttyDir\pageant.exe"
          $keyFile = "$env:USERPROFILE\.ssh\pageant_test"

          Write-Host "=== pre-launch environment ==="
          Write-Host "  pageant.exe:  $pageantExe (exists=$(Test-Path $pageantExe))"
          Write-Host "  key file:     $keyFile (exists=$(Test-Path $keyFile))"
          if (Test-Path $keyFile) {
            $ki = Get-Item $keyFile
            Write-Host "  key size:     $($ki.Length) bytes"
            Write-Host "  key first 40: $((Get-Content $keyFile -TotalCount 1))"
          }
          Write-Host "  USERNAME:     $env:USERNAME"
          Write-Host "  USERPROFILE:  $env:USERPROFILE"
          Write-Host "  SESSIONNAME:  $env:SESSIONNAME"
          Write-Host "  interactive:  $([Environment]::UserInteractive)"

          Write-Host "=== existing pageant processes (should be none) ==="
          Get-Process pageant -ErrorAction SilentlyContinue | Format-Table Id,ProcessName,StartTime

          # Redirect pageant's stdout/stderr so we can see any startup error it
          # would otherwise print and drop on the floor.
          $pageantOut = "$env:TEMP\pageant.out"
          $pageantErr = "$env:TEMP\pageant.err"
          Set-Content -Path $pageantOut -Value "" -NoNewline
          Set-Content -Path $pageantErr -Value "" -NoNewline

          Write-Host "=== launching pageant ==="
          Write-Host "  cmd: $pageantExe $keyFile"
          $proc = Start-Process -FilePath $pageantExe `
            -ArgumentList $keyFile `
            -PassThru `
            -RedirectStandardOutput $pageantOut `
            -RedirectStandardError $pageantErr
          Write-Host "  Start-Process returned PID=$($proc.Id)"

          # Let Pageant spawn before the readiness probe starts hammering it.
          Start-Sleep -Seconds 3

          Write-Host "=== post-launch process state ==="
          $proc.Refresh()
          Write-Host "  HasExited: $($proc.HasExited)"
          if ($proc.HasExited) {
            Write-Host "  ExitCode:  $($proc.ExitCode)"
            Write-Host "  ExitTime:  $($proc.ExitTime)"
          } else {
            Write-Host "  PID:          $($proc.Id)"
            Write-Host "  StartTime:    $($proc.StartTime)"
            Write-Host "  MainWindow:   $($proc.MainWindowHandle)"
            Write-Host "  MainWindowTitle: $($proc.MainWindowTitle)"
            Write-Host "  Responding:   $($proc.Responding)"
            Write-Host "  Threads:      $($proc.Threads.Count)"
          }

          Write-Host "=== pageant stdout ==="
          Get-Content $pageantOut -Raw
          Write-Host "=== pageant stderr ==="
          Get-Content $pageantErr -Raw

          Write-Host "=== all pageant processes visible to Get-Process ==="
          $all = Get-Process pageant -ErrorAction SilentlyContinue
          if ($all) {
            $all | Format-Table Id,ProcessName,StartTime,MainWindowHandle,MainWindowTitle,Responding
          } else {
            Write-Host "  (none)"
          }

          Write-Host "=== tasklist /v for pageant (catches processes in other sessions) ==="
          tasklist /v /fi "IMAGENAME eq pageant.exe"

          # Enumerate every top-level window owned by pageant (not just
          # MainWindowHandle, which is 0 for its hidden IPC window). If
          # pageant has opened a modal dialog - passphrase prompt, format
          # warning, etc - we'll see it here. A modal dialog blocks
          # pageant's message loop so WM_COPYDATA replies never arrive,
          # even though FindWindow("Pageant","Pageant") still succeeds.
          Write-Host "=== all top-level windows owned by pageant ==="
          $cs = @(
            'using System;',
            'using System.Runtime.InteropServices;',
            'using System.Text;',
            'using System.Collections.Generic;',
            'public class WinEnum {',
            '  public delegate bool EnumProc(IntPtr h, IntPtr l);',
            '  [DllImport("user32.dll")] public static extern bool EnumWindows(EnumProc p, IntPtr l);',
            '  [DllImport("user32.dll")] public static extern int GetWindowText(IntPtr h, StringBuilder s, int n);',
            '  [DllImport("user32.dll")] public static extern int GetClassName(IntPtr h, StringBuilder s, int n);',
            '  [DllImport("user32.dll")] public static extern uint GetWindowThreadProcessId(IntPtr h, out uint pid);',
            '  [DllImport("user32.dll")] public static extern bool IsWindowVisible(IntPtr h);',
            '  public static List<string> ForPid(uint pid) {',
            '    var r = new List<string>();',
            '    EnumWindows((h, l) => {',
            '      uint wp; GetWindowThreadProcessId(h, out wp);',
            '      if (wp == pid) {',
            '        var t = new StringBuilder(256); GetWindowText(h, t, 256);',
            '        var c = new StringBuilder(256); GetClassName(h, c, 256);',
            '        r.Add(string.Format("hwnd=0x{0:X} visible={1} class=\"{2}\" title=\"{3}\"",',
            '          h.ToInt64(), IsWindowVisible(h), c.ToString(), t.ToString()));',
            '      }',
            '      return true;',
            '    }, IntPtr.Zero);',
            '    return r;',
            '  }',
            '}'
          ) -join "`n"
          if (-not ('WinEnum' -as [type])) { Add-Type -TypeDefinition $cs }
          $wins = [WinEnum]::ForPid([uint32]$proc.Id)
          if ($wins.Count -eq 0) {
            Write-Host "  (no top-level windows for pid $($proc.Id))"
          } else {
            foreach ($w in $wins) { Write-Host "  $w" }
          }

          Write-Host "=== recent application event log entries (last 2 min) ==="
          Get-WinEvent -LogName Application -MaxEvents 50 -ErrorAction SilentlyContinue |
            Where-Object { $_.TimeCreated -gt (Get-Date).AddMinutes(-2) } |
            Format-Table TimeCreated,ProviderName,Id,LevelDisplayName,Message -Wrap

          if ($proc.HasExited) {
            throw "Pageant exited immediately (exit=$($proc.ExitCode)) - see stdout/stderr/event-log above"
          }
          if (-not (Get-Process pageant -ErrorAction SilentlyContinue)) {
            throw "No pageant process visible after launch"
          }
          Write-Host "Pageant appears to be running (PID=$($proc.Id))"

          # ---- Readiness probe ----
          # Pageant process existence != Pageant readiness. Poll plink here
          # so ssh2's 20s handshake timer doesn't trip while Pageant is still
          # initializing. Same step, so the job object still owns pageant.
          Write-Host "=== verifying pageant readiness via plink ==="

          # Diagnostic: confirm the committed key survived checkout without
          # CRLF conversion. Pageant rejects keys with CRLF line endings.
          $keyPath = "$env:USERPROFILE\.ssh\pageant_test"
          $keyBytes = [System.IO.File]::ReadAllBytes($keyPath)
          $hasCRLF = $false
          for ($i = 0; $i -lt $keyBytes.Length - 1; $i++) {
            if ($keyBytes[$i] -eq 13 -and $keyBytes[$i+1] -eq 10) { $hasCRLF = $true; break }
          }
          Write-Host "Key file: size=$($keyBytes.Length) bytes, CRLF=$hasCRLF"
          Write-Host "Key first line: $([System.Text.Encoding]::ASCII.GetString($keyBytes[0..40]))"

          $hostkeyArgs = @()
          foreach ($line in (ssh-keygen -l -f "$env:USERPROFILE\.ssh\known_hosts")) {
            if ($line -match 'SHA256:(\S+)') {
              $hostkeyArgs += "-hostkey"
              $hostkeyArgs += "SHA256:$($matches[1])"
            }
          }

          $nullIn = "$env:TEMP\plink.in"
          Set-Content -Path $nullIn -Value "" -NoNewline

          # plink's internal SendMessageTimeout is 10s; per-attempt wait must
          # exceed that so we see plink's own "pageant didn't respond" error
          # instead of killing it early and blaming the probe.
          $deadline = (Get-Date).AddSeconds(60)
          $ok = $false
          $attempt = 0
          while ((Get-Date) -lt $deadline) {
            $attempt++
            $outFile = "$env:TEMP\plink.$attempt.out"
            $errFile = "$env:TEMP\plink.$attempt.err"
            # -v for verbose diagnostics in case plink silently does nothing.
            $plinkArgs = @("-v", "-agent", "-batch") + $hostkeyArgs + `
              @("$env:USERNAME@127.0.0.1", "echo pageant-ready")
            $p = Start-Process -FilePath "$puttyDir\plink.exe" `
              -ArgumentList $plinkArgs -NoNewWindow -PassThru `
              -RedirectStandardInput $nullIn `
              -RedirectStandardOutput $outFile `
              -RedirectStandardError $errFile
            $exited = $p.WaitForExit(15000)
            if ($exited -and $p.ExitCode -eq 0) {
              $ok = $true
              Write-Host "--- attempt ${attempt}: SUCCESS ---"
              Write-Host "stdout:`n$(Get-Content $outFile -Raw)"
              break
            }
            if (-not $p.HasExited) {
              $p.Kill()
              Write-Host "--- attempt ${attempt}: TIMEOUT (killed) ---"
            } else {
              Write-Host "--- attempt ${attempt}: exit=$($p.ExitCode) ---"
            }
            Write-Host "stdout:`n$(Get-Content $outFile -Raw)"
            Write-Host "stderr:`n$(Get-Content $errFile -Raw)"
            Start-Sleep -Milliseconds 500
          }
          if (-not $ok) {
            throw "Pageant did not become ready within 15 seconds"
          }
          Write-Host "Pageant is ready."

          # ---- Run the integration tests ----
          # powershell doesn't propagate native-command exit codes the way
          # `set -e` does in bash, so we check $LASTEXITCODE explicitly.
          Write-Host "=== running integration tests ==="
          Remove-Item Env:SSH_AUTH_SOCK -ErrorAction SilentlyContinue
          Set-Location "$env:GITHUB_WORKSPACE\apps\studio"
          yarn run test:integration:windows --runInBand --ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
