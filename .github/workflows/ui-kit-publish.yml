name: UI Kit - Build & Publish

permissions:
  contents: read

on:
  push:
    tags:
      - "ui-kit:v*"

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @beekeeperstudio/ui-kit run test

      - name: Build
        run: pnpm --filter @beekeeperstudio/ui-kit run build

      - name: Publish to npm
        # --no-git-checks: CI checks out a tag (detached HEAD), which pnpm's
        # git branch/clean checks would otherwise reject
        run: pnpm --filter @beekeeperstudio/ui-kit publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
