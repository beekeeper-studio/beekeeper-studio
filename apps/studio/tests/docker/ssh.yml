version: '3'
volumes:
  psql:
services:
  postgres:
    image: postgres:13
    container_name: test_ssh_postgres
    environment:
      POSTGRES_USER: bks
      POSTGRES_PASSWORD: example
      POSTGRES_DB: test
    ports:
      - 5432
  mysql:
    image: mysql:8
    container_name: test_ssh_mysql
    environment:
      MYSQL_USER: bks
      MYSQL_PASSWORD: example
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: test
    ports:
      - 3306
  mariadb:
    image: mariadb
    container_name: test_ssh_mariadb
    environment:
      MYSQL_USER: bks
      MYSQL_PASSWORD: example
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: test
    ports:
      - 3306
  ssh:
    build:
      context: ./
      dockerfile: ./SSHDockerFile
    container_name: test_ssh
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - PASSWORD_ACCESS=true #optional
      - USER_PASSWORD=password #optional
      - USER_NAME=beekeeper #optional
      - SUDO_ACCESS=true
    ports:
      - "7222:2222"
