version: '3'
volumes:
  psql:
networks:
  testrunner_ssh:
  testrunner_bastion:
  bastion_ssh:
  ssh_postgres:
services:
  postgres:
    image: postgres:16.4
    container_name: test_ssh_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: integration_test
    networks:
      - ssh_postgres
  ssh:
    build:
      context: ./
      dockerfile: ./SSHDockerFile
    container_name: test_ssh
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - PASSWORD_ACCESS=true #optional
      - USER_PASSWORD=password #optional
      - USER_NAME=beekeeper #optional
      - SUDO_ACCESS=true
    ports:
      - 2222
    networks:
      - testrunner_ssh
      - bastion_ssh
      - ssh_postgres
  bastion:
    build:
      context: ./
      dockerfile: ./SSHDockerFile
    container_name: test_ssh_bastion
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=password
      - USER_NAME=beekeeper
      - SUDO_ACCESS=true
    ports:
      - 2222
    networks:
      - testrunner_bastion
      - bastion_ssh
